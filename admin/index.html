<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КРИСТИНА.AI — Админ-панель</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e17 0%, #1a2332 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00F0FF;
    }
    .container { text-align: center; padding: 40px; }
    h1 { margin-bottom: 20px; font-size: 2rem; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #00F0FF;
      color: #0a0e17;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .loading { display: none; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Вход в админ-панель</h1>
    <p>Нажми кнопку ниже для авторизации через GitHub</p>
    <button class="btn" onclick="loginWithGitHub()">Войти через GitHub</button>
    <div class="loading" id="loading">Загрузка...</div>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    // Конфигурация OAuth
    const CLIENT_ID = 'Ov23liMNKPrvdqhLkAqK';
    const REPO = 'chatbotsmarketolog-dotcom/Chatbot-and-AI-Agent-Studio';
    const BRANCH = 'main';
    
    // Обработка callback после авторизации
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      const params = new URLSearchParams(hash.substring(1));
      const token = params.get('access_token');
      
      if (token) {
        // Сохраняем токен
        localStorage.setItem('decap-cms-user', JSON.stringify({
          token: token,
          repo: REPO,
          backend: 'github'
        }));
        
        // Показываем загрузку
        document.querySelector('.loading').style.display = 'block';
        document.querySelector('button').style.display = 'none';
        
        // Инициализируем CMS
        setTimeout(() => {
          CMS.init({
            backend: {
              name: 'github',
              repo: REPO,
              branch: BRANCH
            },
            load_config_file: true,
            config_path: 'admin/config.yml'
          });
        }, 500);
      }
    }
    
    // Функция входа
    function loginWithGitHub() {
      const redirectUri = window.location.origin + window.location.pathname;
      const authUrl = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=repo`;
      window.location.href = authUrl;
    }
  </script>
</body>
</html>
