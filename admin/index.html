<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КРИСТИНА.AI — Админ-панель</title>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; background: #0a0e17; color: #00F0FF; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; }
    h1 { margin-bottom: 20px; }
    .btn { padding: 12px 24px; background: #00F0FF; color: #000; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
    .loading { display: none; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Вход в админ-панель</h1>
    <p id="status-text">Нажми кнопку ниже для авторизации через GitHub</p>
    <button id="login-btn" class="btn" onclick="startLogin()">Войти через GitHub</button>
    <div class="loading" id="loading">Обмен токеном... Пожалуйста, подождите.</div>
  </div>

  <script>
    // ТВОИ ДАННЫЕ
    const CLIENT_ID = 'Ov23liMNKPrvdqhLkAqK';
    const CLIENT_SECRET = 'c481cbd56a5adae0998360cb8824cdd658b10683';
    const REPO = 'chatbotsmarketolog-dotcom/Chatbot-and-AI-Agent-Studio';
    
    const loginBtn = document.getElementById('login-btn');
    const loading = document.getElementById('loading');
    const statusText = document.getElementById('status-text');

    // 1. Проверяем, есть ли код возврата от GitHub
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    if (code) {
      // Если код есть — скрываем кнопку, показываем загрузку
      loginBtn.style.display = 'none';
      loading.style.display = 'block';
      statusText.innerText = 'Связываемся с GitHub...';
      
      exchangeCodeForToken(code);
    } else {
      // Если токена нет в памяти — показываем кнопку
      const storedUser = localStorage.getItem('decap-cms-user');
      if (storedUser) {
         initCMS(JSON.parse(storedUser));
      }
    }

    // 2. Функция начала входа
    function startLogin() {
      const redirectUri = window.location.origin + window.location.pathname;
      const authUrl = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=repo`;
      window.location.href = authUrl;
    }

    // 3. Функция обмена кода на токен
    async function exchangeCodeForToken(code) {
      try {
        const response = await fetch('https://github.com/login/oauth/access_token', {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new URLSearchParams({
            client_id: CLIENT_ID,
            client_secret: CLIENT_SECRET,
            code: code
          })
        });
        
        const data = await response.json();
        
        if (data.access_token) {
          statusText.innerText = 'Успешно! Загружаем админку...';
          // Сохраняем токен
          const user = { token: data.access_token, repo: REPO, backend: 'github' };
          localStorage.setItem('decap-cms-user', JSON.stringify(user));
          
          // Очищаем URL от ?code=...
          window.history.replaceState(null, '', window.location.pathname);
          
          // Запускаем CMS
          initCMS(user);
        } else {
          statusText.innerText = 'Ошибка: ' + (data.error_description || data.message);
          loginBtn.style.display = 'inline-block';
          loading.style.display = 'none';
        }
      } catch (error) {
        statusText.innerText = 'Ошибка сети. Попробуй позже.';
        console.error(error);
      }
    }

    // 4. Инициализация CMS
    function initCMS(user) {
      loginBtn.style.display = 'none';
      loading.style.display = 'block';
      loading.innerText = 'Загрузка интерфейса...';
      
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
      script.onload = () => {
        CMS.init({
          backend: {
            name: 'github',
            repo: REPO,
            branch: 'main'
          },
          load_config_file: true,
          config_path: 'admin/config.yml'
        });
      };
      document.head.appendChild(script);
    }
  </script>
</body>
</html>
