<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КРИСТИНА.AI — Админ-панель</title>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #0a0e17 0%, #1a2332 100%); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: #00F0FF;
    }
    .container { 
      text-align: center; 
      padding: 40px; 
      max-width: 600px;
    }
    h1 { margin-bottom: 20px; font-size: 2rem; }
    .info { 
      background: rgba(0,240,255,0.1); 
      padding: 20px; 
      border-radius: 12px; 
      margin: 20px 0; 
      text-align: left; 
      font-size: 14px;
      border-left: 4px solid #00F0FF;
    }
    .info a { color: #00F0FF; }
    .input { 
      width: 100%; 
      padding: 14px; 
      margin: 15px 0; 
      border: 2px solid #00F0FF; 
      border-radius: 8px; 
      background: #1a2332; 
      color: #00F0FF; 
      font-size: 14px;
      box-sizing: border-box;
    }
    .btn { 
      padding: 14px 28px; 
      background: #00F0FF; 
      color: #0a0e17; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      cursor: pointer; 
      font-weight: bold; 
      margin-top: 10px;
    }
    .btn:hover { opacity: 0.9; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="login-screen" class="container">
    <h1>🔐 Вход в админ-панель</h1>
    
    <div class="info">
      <strong>Как получить токен:</strong><br>
      1. Перейди: <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a><br>
      2. Нажми <strong>Generate new token (classic)</strong><br>
      3. Введи название: <code>КРИСТИНА.AI CMS</code><br>
      4. Поставь галочку: <strong>repo</strong> (полный доступ)<br>
      5. Нажми <strong>Generate token</strong><br>
      6. Скопируй токен (начинается на <code>ghp_...</code>)
    </div>
    
    <input type="password" id="token-input" class="input" placeholder="Вставь токен (ghp_...)">
    <button class="btn" onclick="handleLogin()">Войти</button>
    <p id="error-msg" style="color: #ff6b6b; margin-top: 15px; display: none;"></p>
  </div>

  <script>
    const REPO = 'chatbotsmarketolog-dotcom/Chatbot-and-AI-Agent-Studio';
    const savedToken = localStorage.getItem('kristina-cms-token');
    
    if (savedToken) {
      initCMS(savedToken);
    }
    
    function handleLogin() {
      const token = document.getElementById('token-input').value.trim();
      if (!token || !token.startsWith('ghp_')) {
        showError('Введите корректный токен (ghp_...)');
        return;
      }
      localStorage.setItem('kristina-cms-token', token);
      initCMS(token);
    }
    
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
    
    function initCMS(token) {
      fetch('https://api.github.com/user', {
        headers: { 'Authorization': `token ${token}` }
      })
      .then(res => res.ok ? res.json() : Promise.reject('Invalid token'))
      .then(user => {
        console.log('✓ Auth:', user.login);
        
        // ПОЛНОСТЬЮ очищаем body перед CMS
        document.body.innerHTML = '<div id="cms-root"></div>';
        
        // Загружаем CMS
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        script.onload = () => {
          CMS.init({
            backend: {
              name: 'github',
              repo: REPO,
              branch: 'main',
              token: token
            },
            load_config_file: true,
            config_path: 'admin/config.yml'
          });
        };
        document.head.appendChild(script);
      })
      .catch(() => {
        localStorage.removeItem('kristina-cms-token');
        showError('Неверный токен');
      });
    }
  </script>
</body>
</html>
