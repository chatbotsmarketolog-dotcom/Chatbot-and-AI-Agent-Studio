<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КРИСТИНА.AI — Админ-панель</title>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #0a0e17 0%, #1a2332 100%); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: #00F0FF;
    }
    .container { 
      text-align: center; 
      padding: 40px; 
      max-width: 600px;
    }
    h1 { margin-bottom: 20px; font-size: 2rem; }
    .info { 
      background: rgba(0,240,255,0.1); 
      padding: 20px; 
      border-radius: 12px; 
      margin: 20px 0; 
      text-align: left; 
      font-size: 14px;
      border-left: 4px solid #00F0FF;
    }
    .info a { color: #00F0FF; }
    .input { 
      width: 100%; 
      padding: 14px; 
      margin: 15px 0; 
      border: 2px solid #00F0FF; 
      border-radius: 8px; 
      background: #1a2332; 
      color: #00F0FF; 
      font-size: 14px;
      box-sizing: border-box;
    }
    .btn { 
      padding: 14px 28px; 
      background: #00F0FF; 
      color: #0a0e17; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      cursor: pointer; 
      font-weight: bold; 
      margin-top: 10px;
    }
    .btn:hover { opacity: 0.9; }
    .hidden { display: none !important; }
    #cms-wrapper { display: none; }
  </style>
</head>
<body>
  <!-- Экран входа -->
  <div id="login-screen" class="container">
    <h1>🔐 Вход в админ-панель</h1>
    
    <div class="info">
      <strong>Как получить токен:</strong><br>
      1. Перейди: <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a><br>
      2. Нажми <strong>Generate new token (classic)</strong><br>
      3. Введи название: <code>КРИСТИНА.AI CMS</code><br>
      4. Поставь галочку: <strong>repo</strong> (полный доступ)<br>
      5. Нажми <strong>Generate token</strong><br>
      6. Скопируй токен (начинается на <code>ghp_...</code>) и вставь ниже
    </div>
    
    <input type="password" id="token-input" class="input" placeholder="Вставь GitHub Personal Access Token (ghp_...)">
    <button class="btn" onclick="handleLogin()">Войти в админку</button>
    <p id="error-msg" style="color: #ff6b6b; margin-top: 15px; display: none;"></p>
  </div>
  
  <!-- Контейнер для CMS -->
  <div id="cms-wrapper"></div>

  <script>
    const REPO = 'chatbotsmarketolog-dotcom/Chatbot-and-AI-Agent-Studio';
    const savedToken = localStorage.getItem('kristina-cms-token');
    
    // Если токен есть — сразу загружаем CMS
    if (savedToken) {
      initCMS(savedToken);
    }
    
    function handleLogin() {
      const token = document.getElementById('token-input').value.trim();
      if (!token) {
        showError('Введите токен!');
        return;
      }
      if (!token.startsWith('ghp_')) {
        showError('Токен должен начинаться с ghp_');
        return;
      }
      
      localStorage.setItem('kristina-cms-token', token);
      initCMS(token);
    }
    
    function showError(msg) {
      const errorEl = document.getElementById('error-msg');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
    
    function initCMS(token) {
      // Проверяем токен
      fetch('https://api.github.com/user', {
        headers: { 
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github.v3+json'
        }
      })
      .then(res => {
        if (!res.ok) throw new Error('Неверный токен');
        return res.json();
      })
      .then(user => {
        console.log('✓ Авторизован как:', user.login);
        
        // Скрываем экран входа ПОЛНОСТЬЮ
        const loginScreen = document.getElementById('login-screen');
        if (loginScreen) {
          loginScreen.classList.add('hidden');
          loginScreen.style.display = 'none';
        }
        
        // Показываем CMS контейнер
        const cmsWrapper = document.getElementById('cms-wrapper');
        cmsWrapper.style.display = 'block';
        
        // Загружаем Decap CMS
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        script.onload = () => {
          console.log('✓ Decap CMS загружен');
          
          // Инициализируем CMS
          CMS.init({
            backend: {
              name: 'github',
              repo: REPO,
              branch: 'main',
              token: token
            },
            load_config_file: true,
            config_path: 'admin/config.yml',
            media_folder: 'assets',
            public_folder: '/assets'
          });
        };
        
        script.onerror = () => {
          showError('Ошибка загрузки CMS. Обновите страницу.');
        };
        
        document.head.appendChild(script);
      })
      .catch(err => {
        console.error('✗ Ошибка:', err);
        localStorage.removeItem('kristina-cms-token');
        showError('Неверный токен или ошибка сети. Попробуйте снова.');
      });
    }
  </script>
</body>
</html>
