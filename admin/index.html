<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КРИСТИНА.AI — Админ-панель</title>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; background: #0a0e17; color: #00F0FF; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 40px; max-width: 500px; }
    h1 { margin-bottom: 20px; }
    .input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #00F0FF; border-radius: 8px; background: #1a2332; color: #00F0FF; font-size: 14px; }
    .btn { padding: 12px 24px; background: #00F0FF; color: #000; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn:hover { opacity: 0.9; }
    .info { background: rgba(0,240,255,0.1); padding: 15px; border-radius: 8px; margin: 20px 0; text-align: left; font-size: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Вход в админ-панель</h1>
    
    <div id="login-form">
      <div class="info">
        <strong>Как получить токен:</strong><br>
        1. Перейди: <a href="https://github.com/settings/tokens" target="_blank" style="color:#00F0FF">github.com/settings/tokens</a><br>
        2. Нажми <strong>Generate new token (classic)</strong><br>
        3. Выбери право: <strong>repo</strong> (полный доступ)<br>
        4. Скопируй токен и вставь ниже
      </div>
      
      <input type="password" id="token-input" class="input" placeholder="Вставь GitHub Personal Access Token">
      <button class="btn" onclick="login()">Войти</button>
    </div>
    
    <div id="loading" class="hidden">
      <p>Загрузка админ-панели...</p>
    </div>
  </div>

  <script>
    const REPO = 'chatbotsmarketolog-dotcom/Chatbot-and-AI-Agent-Studio';
    
    // Проверяем, есть ли сохраненный токен
    const savedToken = localStorage.getItem('github-token');
    if (savedToken) {
      initCMS(savedToken);
    }
    
    function login() {
      const token = document.getElementById('token-input').value.trim();
      if (!token) {
        alert('Введите токен!');
        return;
      }
      
      // Сохраняем токен
      localStorage.setItem('github-token', token);
      
      // Показываем загрузку
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      
      // Инициализируем CMS
      initCMS(token);
    }
    
    function initCMS(token) {
      // Проверяем токен
      fetch('https://api.github.com/user', {
        headers: { 'Authorization': `token ${token}` }
      })
      .then(res => {
        if (res.ok) {
          loadDecapCMS(token);
        } else {
          alert('Неверный токен! Попробуйте снова.');
          localStorage.removeItem('github-token');
          location.reload();
        }
      })
      .catch(() => {
        alert('Ошибка сети. Попробуйте снова.');
        localStorage.removeItem('github-token');
        location.reload();
      });
    }
    
    function loadDecapCMS(token) {
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
      script.onload = () => {
        CMS.init({
          backend: {
            name: 'github',
            repo: REPO,
            branch: 'main',
            token: token
          },
          load_config_file: true,
          config_path: 'admin/config.yml'
        });
      };
      document.head.appendChild(script);
    }
  </script>
</body>
</html>
