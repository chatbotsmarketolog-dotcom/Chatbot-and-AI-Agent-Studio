<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КРИСТИНА.AI — Админ-панель</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e17 0%, #1a2332 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00F0FF;
    }
    .container { text-align: center; padding: 40px; }
    h1 { margin-bottom: 20px; font-size: 2rem; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #00F0FF;
      color: #0a0e17;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .loading { display: none; margin-top: 20px; color: #00F0FF; }
    #cms-container { display: none; width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div class="container" id="login-container">
    <h1>🔐 Вход в админ-панель</h1>
    <p>Нажми кнопку ниже для авторизации через GitHub</p>
    <button class="btn" onclick="window.loginWithGitHub()">Войти через GitHub</button>
    <div class="loading" id="loading">Загрузка...</div>
  </div>
  
  <div id="cms-container"></div>

  <script>
    // Глобальная функция для входа
    window.loginWithGitHub = function() {
      const CLIENT_ID = 'Ov23liMNKPrvdqhLkAqK';
      const redirectUri = window.location.origin + window.location.pathname;
      const authUrl = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=repo`;
      window.location.href = authUrl;
    };
    
    // Обработка callback после авторизации
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      const params = new URLSearchParams(hash.substring(1));
      const token = params.get('access_token');
      
      if (token) {
        // Показываем загрузку
        document.getElementById('loading').style.display = 'block';
        document.querySelector('.btn').style.display = 'none';
        
        // Сохраняем токен
        localStorage.setItem('decap-cms-user', JSON.stringify({
          token: token,
          repo: 'chatbotsmarketolog-dotcom/Chatbot-and-AI-Agent-Studio',
          backend: 'github'
        }));
        
        // Очищаем URL от токена
        window.history.replaceState(null, '', window.location.pathname);
        
        // Загружаем Decap CMS
        loadDecapCMS();
      }
    }
    
    // Функция загрузки CMS
    function loadDecapCMS() {
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
      script.onload = function() {
        CMS.init({
          backend: {
            name: 'github',
            repo: 'chatbotsmarketolog-dotcom/Chatbot-and-AI-Agent-Studio',
            branch: 'main'
          },
          load_config_file: true,
          config_path: 'admin/config.yml'
        });
      };
      document.head.appendChild(script);
    }
  </script>
</body>
</html>
