backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  # === БЛОГ (НОВЫЕ ОТДЕЛЬНЫЕ СТРАНИЦЫ) ===
  - name: "blog"
    label: "📝 Блог"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - label: "Заголовок"
        name: "title"
        widget: "string"
      - label: "Дата публикации"
        name: "date"
        widget: "datetime"
      - label: "Описание (для SEO)"
        name: "description"
        widget: "text"
      - label: "Изображение"
        name: "image"
        widget: "image"
        required: false
      - label: "Контент"
        name: "body"
        widget: "markdown"

  # === САЙТ (ГЛАВНАЯ СТРАНИЦА) ===
  - name: "site"
    label: "📄 Сайт КРИСТИНА.AI"
    editor:
      preview: false
    files:
      - name: "site-config"
        file: "content/site.json"
        label: "📄 Главная страница"
        fields:
          # === SEO ===
          - label: "🔍 SEO настройки"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
              - label: "Keywords"
                name: "keywords"
                widget: "string"

          # === HEADER (с выбором типа ссылки) ===
          - label: "🔝 Шапка сайта"
            name: "header"
            widget: "object"
            collapsed: false
            fields:
              - label: "Логотип"
                name: "logo"
                widget: "string"
              - label: "Пункты меню"
                name: "menu"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - label: "Название"
                    name: "label"
                    widget: "string"
                  - label: "Тип ссылки"
                    name: "type"
                    widget: "select"
                    options:
                      - label: "Якорь на главной (#section)"
                        value: "anchor"
                      - label: "Отдельная страница (/page)"
                        value: "page"
                  - label: "Ссылка"
                    name: "href"
                    widget: "string"
                    hint: "Для якоря: #hero, для страницы: /blog"

          # === HERO SECTION ===
          - label: "🎯 Hero"
            name: "hero"
            widget: "object"
            fields:
              - label: "Надзаголовок"
                name: "eyebrow"
                widget: "string"
              - label: "Заголовок H1"
                name: "title"
                widget: "string"
              - label: "Описание"
                name: "description"
                widget: "markdown"
              - label: "Текст кнопки 1"
                name: "btn1_text"
                widget: "string"
              - label: "Ссылка кнопки 1"
                name: "btn1_link"
                widget: "string"
              - label: "Текст кнопки 2"
                name: "btn2_text"
                widget: "string"
              - label: "Ссылка кнопки 2"
                name: "btn2_link"
                widget: "string"
              - label: "Триггеры"
                name: "triggers"
                widget: "string"

          # === ABOUT ===
          - label: "👤 Обо мне"
            name: "about"
            widget: "object"
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
              - label: "Текст 1"
                name: "text1"
                widget: "markdown"
              - label: "Текст 2"
                name: "text2"
                widget: "markdown"
              - label: "Статистика"
                name: "stats"
                widget: "list"
                fields:
                  - label: "Число"
                    name: "number"
                    widget: "string"
                  - label: "Подпись"
                    name: "text"
                    widget: "string"
              - label: "Имя"
                name: "name"
                widget: "string"
              - label: "Должность"
                name: "role"
                widget: "string"
              - label: "Цитата"
                name: "quote"
                widget: "markdown"
              - label: "Telegram"
                name: "telegram"
                widget: "string"
              - label: "VK"
                name: "vk"
                widget: "string"

          # === SERVICES ===
          - label: "⚙️ Услуги"
            name: "services"
            widget: "object"
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
              - label: "Карточки"
                name: "cards"
                widget: "list"
                fields:
                  - label: "Иконка"
                    name: "icon"
                    widget: "string"
                  - label: "Название"
                    name: "title"
                    widget: "string"
                  - label: "Описание"
                    name: "description"
                    widget: "markdown"
                  - label: "Цена"
                    name: "price"
                    widget: "string"
                  - label: "Текст кнопки"
                    name: "btn_text"
                    widget: "string"

          # === PRICING ===
          - label: "💰 Тарифы"
            name: "pricing"
            widget: "object"
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
              - label: "Карточки"
                name: "cards"
                widget: "list"
                fields:
                  - label: "Иконка"
                    name: "icon"
                    widget: "string"
                  - label: "Название"
                    name: "name"
                    widget: "string"
                  - label: "Подзаголовок"
                    name: "subtitle"
                    widget: "string"
                  - label: "Цена"
                    name: "price"
                    widget: "string"
                  - label: "Популярный"
                    name: "popular"
                    widget: "boolean"
                  - label: "Возможности"
                    name: "features"
                    widget: "list"
                  - label: "Текст кнопки"
                    name: "btn_text"
                    widget: "string"

          # === TESTIMONIALS ===
          - label: "⭐ Отзывы"
            name: "testimonials"
            widget: "object"
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
              - label: "Карточки"
                name: "cards"
                widget: "list"
                fields:
                  - label: "Имя"
                    name: "author"
                    widget: "string"
                  - label: "Профессия"
                    name: "role"
                    widget: "string"
                  - label: "Текст"
                    name: "text"
                    widget: "markdown"
                  - label: "Рейтинг"
                    name: "rating"
                    widget: "number"
              - label: "Ссылка на бота"
                name: "bot_link"
                widget: "string"

          # === VIDEO SECTION (НОВОЕ: Rutube, VK) ===
          - label: "🎥 Видео"
            name: "video"
            widget: "object"
            collapsed: false
            fields:
              - label: "Заголовок секции"
                name: "title"
                widget: "string"
                default: "Смотри мои видео"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
              - label: "Видео"
                name: "videos"
                widget: "list"
                fields:
                  - label: "Название видео"
                    name: "title"
                    widget: "string"
                  - label: "Платформа"
                    name: "platform"
                    widget: "select"
                    options:
                      - label: "YouTube"
                        value: "youtube"
                      - label: "Rutube"
                        value: "rutube"
                      - label: "VK Видео"
                        value: "vk"
                  - label: "ID видео или ссылка"
                    name: "video_id"
                    widget: "string"
                    hint: "Для YouTube: dQw4w9WgXcQ, для Rutube/VK: полная ссылка"

          # === CONTACTS ===
          - label: "📞 Контакты"
            name: "contacts"
            widget: "object"
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
              - label: "Подзаголовок"
                name: "subtitle"
                widget: "markdown"
              - label: "Telegram"
                name: "telegram"
                widget: "string"
              - label: "VK"
                name: "vk"
                widget: "string"
              - label: "Instagram"
                name: "instagram"
                widget: "string"
              - label: "Режим работы"
                name: "hours"
                widget: "string"
              - label: "AI-статус"
                name: "ai_status"
                widget: "string"
              - label: "Финальная фраза"
                name: "final_text"
                widget: "markdown"

          # === APPLICATIONS ===
          - label: "🚀 Блок заявки"
            name: "applications"
            widget: "object"
            fields:
              - label: "Заголовок"
                name: "title"
                widget: "string"
              - label: "Описание"
                name: "description"
                widget: "markdown"
              - label: "Название виджета"
                name: "widget_name"
                widget: "string"
              - label: "Подпись"
                name: "widget_subtitle"
                widget: "string"

          # === FOOTER ===
          - label: "🔻 Footer"
            name: "footer"
            widget: "object"
            fields:
              - label: "Логотип"
                name: "logo"
                widget: "string"
              - label: "Telegram"
                name: "telegram_link"
                widget: "string"
              - label: "VK"
                name: "vk_link"
                widget: "string"
              - label: "Instagram"
                name: "instagram_link"
                widget: "string"
              - label: "Копирайт"
                name: "copyright"
                widget: "string"

          # === CUSTOM CODE ===
          - label: "💻 Кастомный код"
            name: "custom_code"
            widget: "object"
            collapsed: true
            fields:
              - label: "Код в <head>"
                name: "head_code"
                widget: "text"
              - label: "Код перед </body>"
                name: "footer_code"
                widget: "text"
