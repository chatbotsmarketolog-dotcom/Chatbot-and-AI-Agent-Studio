backend:
  name: github
  repo: chatbotsmarketolog-dotcom/Chatbot-and-AI-Agent-Studio
  branch: main

media_folder: "assets"
public_folder: "/assets"

publish_mode: simple

collections:
  - name: "site"
    label: "Сайт"
    editor:
      preview: false
    files:
      - name: "site-config"
        file: "content/site.json"
        label: "Главная"
        fields:
          - label: "Title"
            name: "title"
            widget: "string"
            default: "Кристина — Эксперт"
