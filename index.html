<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Кристина — Запись на консультацию</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #0a0e14;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .chat-container {
    max-width: 600px;
    width: 100%;
    background: rgba(18, 43, 31, 0.6);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(0, 229, 255, 0.2);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    height: 80vh;
    max-height: 700px;
  }
  .chat-header {
    padding: 1rem 1.5rem;
    background: rgba(0, 229, 255, 0.03);
    border-bottom: 1px solid rgba(0, 229, 255, 0.1);
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .chat-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00E5FF, #00FF88);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    box-shadow: 0 0 12px rgba(0,229,255,0.3);
  }
  .chat-header-info h4 {
    font-size: 1rem;
    font-weight: 700;
    color: white;
  }
  .chat-header-info p {
    font-size: 0.75rem;
    color: #7BA88F;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .message {
    max-width: 85%;
    padding: 0.8rem 1rem;
    border-radius: 18px;
    font-size: 0.9rem;
    line-height: 1.4;
    animation: fadeIn 0.3s ease;
  }
  .bot {
    align-self: flex-start;
    background: rgba(0, 229, 255, 0.08);
    border: 1px solid rgba(0, 229, 255, 0.15);
    border-bottom-left-radius: 4px;
    color: white;
  }
  .user {
    align-self: flex-end;
    background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(0,255,136,0.1));
    border: 1px solid rgba(0,229,255,0.3);
    border-bottom-right-radius: 4px;
  }
  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 0.8rem;
  }
  .btn {
    background: rgba(0, 229, 255, 0.1);
    border: 1px solid rgba(0, 229, 255, 0.3);
    border-radius: 40px;
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
    font-weight: 500;
    color: #00E5FF;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover {
    background: rgba(0, 229, 255, 0.2);
    transform: translateY(-2px);
  }
  .input-area {
    padding: 1rem 1.5rem;
    border-top: 1px solid rgba(0, 229, 255, 0.1);
    background: rgba(0, 229, 255, 0.02);
    display: flex;
    gap: 0.8rem;
  }
  .input-area input {
    flex: 1;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0, 229, 255, 0.2);
    border-radius: 40px;
    padding: 0.8rem 1.2rem;
    color: white;
    font-size: 0.9rem;
    outline: none;
  }
  .input-area button {
    background: linear-gradient(135deg, #00E5FF, #00FF88);
    border: none;
    border-radius: 40px;
    padding: 0.8rem 1.4rem;
    font-weight: bold;
    color: #0a0e14;
    cursor: pointer;
  }
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 0.6rem 1rem;
    background: rgba(0,229,255,0.05);
    border-radius: 20px;
    width: fit-content;
  }
  .typing span {
    width: 6px;
    height: 6px;
    background: #00E5FF;
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="chat-avatar">🤖</div>
    <div class="chat-header-info">
      <h4>AI-Агент Кристины</h4>
      <p>менеджер по записи</p>
    </div>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Введите сообщение..." autocomplete="off">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
  // ========== НАСТРОЙКИ ==========
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyEWojF_cagROYF96Jxx6QA2r8MtFRBaHkw62Da-vu4yeoxZC2bK-BWzDlPgcM6aJQa4Q/exec';
  
  // Состояние
  let step = 0;
  let answers = {
    name: '',
    age: '',
    sphere: '',
    service: '',
    income: '',
    contact: ''
  };
  let waitingForInput = false;
  let selectedMessenger = '';
  
  // Вопросы
  const questions = [
    { text: 'Доброго времени суток! Я ваш менеджер по приёму заявок на запись. Ответьте на вопросы анкеты, чтобы оставить заявку!', next: 1 },
    { text: 'Как вас зовут?', next: 2, input: true },
    { text: 'Сколько вам лет?', next: 3, input: true },
    { text: 'В какой сфере вы развиваетесь сейчас?', next: 4, input: true },
    { text: 'Какая из моих услуг вам сейчас актуальна?', next: 5, buttons: ['🤖 Чат-бот', '🧠 AI-агент', '💬 Общая консультация', '❓ Затрудняюсь'] },
    { text: 'Какой у вас средний доход с клиента или продукта? (можете нажать "Не скажу")', next: 6, buttons: ['до 10 000 ₽', '10 000–50 000 ₽', '50 000–200 000 ₽', 'более 200 000 ₽', 'Не скажу'] },
    { text: 'Выберите мессенджер, в котором вам удобно получить ответ:', next: 7, buttons: ['Telegram', 'VK', 'Instagram', 'TenChat'] },
    { text: 'Введите ваш никнейм в выбранном мессенджере:', next: 8, input: true }
  ];
  
  const messagesDiv = document.getElementById('chatMessages');
  const inputField = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  
  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `message ${sender}`;
    div.innerHTML = `<div>${text}</div>`;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
  
  function addButtons(buttons) {
    const div = document.createElement('div');
    div.className = 'message bot';
    const btnsDiv = document.createElement('div');
    btnsDiv.className = 'buttons';
    buttons.forEach(btnText => {
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.innerText = btnText;
      btn.onclick = () => {
        btnsDiv.remove();
        addMessage(btnText, 'user');
        handleAnswer(btnText);
      };
      btnsDiv.appendChild(btn);
    });
    div.appendChild(btnsDiv);
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
  
  function showTyping() {
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message bot';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    messagesDiv.appendChild(typingDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
  
  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }
  
  async function handleAnswer(answer) {
    if (step === 1) answers.name = answer;
    else if (step === 2) answers.age = answer;
    else if (step === 3) answers.sphere = answer;
    else if (step === 4) answers.service = answer;
    else if (step === 5) answers.income = answer;
    else if (step === 6) {
      selectedMessenger = answer;
      step = 6;
      waitingForInput = true;
      showTyping();
      setTimeout(() => {
        hideTyping();
        addMessage(questions[6].text, 'bot');
        inputField.disabled = false;
        inputField.focus();
      }, 500);
      return;
    } else if (step === 7) {
      answers.contact = `${selectedMessenger}: ${answer}`;
      showTyping();
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: answers.name,
            age: answers.age,
            sphere: answers.sphere,
            service: answers.service,
            income: answers.income,
            contact: answers.contact
          })
        });
        const result = await response.json();
        hideTyping();
        if (result.success) {
          addMessage('✅ Ваша заявка на консультацию успешно принята! Эксперт свяжется с вами в ближайшее время для уточнения точного времени встречи.', 'bot');
        } else {
          addMessage('❌ Произошла ошибка при отправке. Пожалуйста, попробуйте позже или свяжитесь напрямую.', 'bot');
        }
      } catch (err) {
        hideTyping();
        addMessage('❌ Ошибка соединения. Проверьте интернет и попробуйте снова.', 'bot');
      }
      inputField.disabled = true;
      sendBtn.disabled = true;
      return;
    }
    
    step++;
    const currentQ = questions[step];
    if (!currentQ) return;
    
    if (currentQ.buttons) {
      showTyping();
      setTimeout(() => {
        hideTyping();
        addMessage(currentQ.text, 'bot');
        addButtons(currentQ.buttons);
        waitingForInput = false;
        inputField.disabled = true;
      }, 500);
    } else if (currentQ.input) {
      waitingForInput = true;
      showTyping();
      setTimeout(() => {
        hideTyping();
        addMessage(currentQ.text, 'bot');
        inputField.disabled = false;
        inputField.focus();
      }, 500);
    } else {
      waitingForInput = false;
      inputField.disabled = true;
      showTyping();
      setTimeout(() => {
        hideTyping();
        addMessage(currentQ.text, 'bot');
        step++;
        const next = questions[step];
        if (next && next.buttons) {
          setTimeout(() => {
            addMessage(next.text, 'bot');
            addButtons(next.buttons);
          }, 800);
        } else if (next && next.input) {
          waitingForInput = true;
          setTimeout(() => {
            addMessage(next.text, 'bot');
            inputField.disabled = false;
            inputField.focus();
          }, 800);
        }
      }, 500);
    }
  }
  
  function onUserInput() {
    const text = inputField.value.trim();
    if (!text) return;
    if (!waitingForInput) return;
    inputField.value = '';
    addMessage(text, 'user');
    waitingForInput = false;
    inputField.disabled = true;
    handleAnswer(text);
  }
  
  sendBtn.addEventListener('click', onUserInput);
  inputField.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') onUserInput();
  });
  
  // Запуск
  setTimeout(() => {
    addMessage(questions[0].text, 'bot');
    step = 0;
    setTimeout(() => {
      step = 1;
      const nextQ = questions[1];
      showTyping();
      setTimeout(() => {
        hideTyping();
        addMessage(nextQ.text, 'bot');
        waitingForInput = true;
        inputField.disabled = false;
        inputField.focus();
      }, 800);
    }, 1500);
  }, 500);
</script>
</body>
</html>
